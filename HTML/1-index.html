<!-- HTML => Hyper Text Markup Language -->
<!-- ! => shortcut for body of HTML -->
<!-- HTML is not a case-sensitive language -->
<!-- This is not a coding file; instead, it structures a web page and its content -->
<!-- HTML tags are components used to design the structure of a website -->
<!-- structure of tags => <opening_tag> content </closing_tag> 
    -> This whole part is called an "Element" --> 
<!-- The html tag is the parent, and head and body are child tags -->
<!-- Some tags have no content in between (e.g., <br>) -->

<!DOCTYPE html> <!-- tells browser you are using HTML5 -->
<html lang="en"> <!-- root of an html document -->
<head> <!-- container for metadata -->
    <!-- things need not be display on the web-page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML page</title> <!-- page title -->
</head>
<body> <!-- contains all data rendered by the browser -->
    <h1>Hello world!</h1> <!-- heading tag -->
    <br> <!-- gives a line space -->
    <p>This is my first paragraph in html</p> <!-- paragraph tag -->
    <br>
    <P>This is a CAPITAL paragraph</P>
</body> 
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com. Spend less. Smile more.</title>
    <!-- This is another CSS file imported for icons from font awesome -->
    <!-- link to get the code tag link : "https://cdnjs.com/libraries/font-awesome" -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!------ Navbar bar ------>
        <div class="navbar">
            <!---- Navbar Logo ---->
            <!-- classes are written with some space in the same property area -->
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>

            <!---- Navbar Address ---->
            <div class="nav-address border">
                <p class="deliver">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="country">India</p>
                </div>
            </div>

            <!---- Navbar Search Bar ---->
            <div class="nav-search">
                <select name = "All" class="search-select">
                    <option value="All">All</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Gift Cards">Gift Cards</option>
                    <option value="Appliances">Appliances</option>
                    <option value="Watches">Watches</option>
                    <option value="Baby">Baby</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Books">Books</option>
                    <option value="Deals">Deals</option>
                    <option value="Music">Music</option>
                </select>
                <input placeholder="  Search Amazon" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            
            <!-- Navbar language -->
            <div class="nav-lang border">
                <i class="fa-solid fa-language"></i>
                <select name="EN" class="EN">
                    <option value="EN">EN</option>
                    <option value="HI">HI</option> <!-- HINDI -->
                    <option value="ES">ES</option> <!-- Spanish -->
                    <option value="AR">AR</option> <!-- Arabic -->
                    <option value="KO">KO</option> <!-- Korean -->
                    <option value="PT">PT</option> <!-- Portuguese -->
                    <option value="ZH">ZH</option> <!-- Chinese -->
                </select>
            </div>

            <!---- Navbar Sign in ---->
            <div class="nav-signin border">
                <p><span class="nav-signin-one">Hello, sign in</span></p>
                <select name="Accounts & Lists" class="signin-details">
                    <option value="Accounts & Lists">Accounts & Lists</option>
                    <option value="Your Account">Your Account</option>
                    <option value="Your Orders">Your Orders</option>
                    <option value="Your Wish List">Your Wish List</option>
                    <option value="Your Prime Video">Your Prime Video</option>
                    <option value="Your Music">Your Music</option>
                    <option value="Your Alexa">Your Alexa</option>
                </select>
            </div>

            <!---- Navbar Returns and Orders ---->
            <div class="nav-returns border">
                <p><span class="nav-return1">Returns</span></p>
                <p><span class="nav-return2">& Orders</span></p>
            </div>

            <!-- Navbar Cart ---->
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-arrow-down"></i>Cart
            </div>
        </div>

        <!------ Panel ------>
        <div class="panel">
            <div class="panel-menu border">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="panel-ops">
                <a href="#" class="a1 border">Today's Deals</a>
                <a href="#" class="a2 border">Prime Video</a>
                <a href="#" class="a3 border">Gift Cards</a>
                <a href="#" class="a4 border">Sell</a>
                <a href="#" class="a5 border">Customer Service</a>
                <a href="#" class="a6 border">Registry</a>
            </div>
        </div>
    </header>
    <!------ Hero-Section ------>
    <div class="hero-section">
        <div class="hero-msg">
            <p>You are on amazon.com. You can also shop on Amazon India for millions of products with fast local delivery.</p>
            <a href="#">Click here to go to amazon.in</a>
        </div>
    </div>
    <!------ Shop Section ------>

</body>
</html>
